plugins {
    id 'java'
}

group = 'ufc.victor'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // MOA (Massive Online Analysis) - Provides the Hoeffding Tree (VFDT)
    implementation('nz.ac.waikato.cms.moa:moa:2023.04.0') {
        // Exclude missing dsol-xml transitive dependency from ssj
        exclude group: 'dsol', module: 'dsol-xml'
    }

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

tasks.register('runExperiment', JavaExec) {
    group = 'application'
    description = 'Runs the adaptive 2PC experiment harness.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'ufc.victor.experiment.ExperimentRunner'
}
